name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - feature/lbti-story-merge
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Generate Scenario Assets
        run: python tools/generate_scenarios.py

      - name: Install dependencies
        run: npm install

      - name: Build app for Pages
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Prepare Pages bundle
        run: |
          cp out/index.html out/404.html
          cp out/storylab/scenario_sandbox.html out/scenario_sandbox.html
          cp out/storylab/services.html out/services.html
          cp out/storylab/generated_scenarios.js out/generated_scenarios.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
